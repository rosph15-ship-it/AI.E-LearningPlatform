<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI-Augmented E-Learning Platform</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <aside class="sidebar">
    <h2>SkillForge AI</h2>
    <ul>
      <li onclick="showSection('dashboard')">Dashboard</li>
      <li onclick="showSection('courses')">Courses</li>
      <li onclick="showSection('chat')">AI Tutor</li>
    </ul>
  </aside>

  <main class="content">

    <!-- Dashboard -->
    <section id="dashboard" class="active">
      <h1>Welcome 👋</h1>

      <p>Level: <span id="level">Beginner</span></p>

      <div class="progress-container">
        <div id="progressBar"></div>
      </div>

      <p><span id="progressText">0%</span> completed</p>
    </section>

    <!-- Courses -->
    <section id="courses">
      <h1>Courses</h1>
      <div class="course" onclick="openLesson()">
        <h3>Python Basics</h3>
      </div>
    </section>

    <!-- Lesson -->
    <section id="lesson">
      <h1>Python Loops</h1>
      <p>Loops repeat actions.</p>
      <button onclick="startQuiz()">Take Quiz</button>
    </section>

    <!-- Quiz -->
    <section id="quiz">
      <h2 id="question"></h2>
    
      <div id="answers"></div>
    
      <!-- New Button Container -->
      <div class="quiz-actions">
        <button class="primary-btn" onclick="submitAnswer()">
          Submit Answer
        </button>
      </div>
    
      <p id="result"></p>
    </section>

    <!-- Chat -->
    <section id="chat">
      <h1>AI Tutor</h1>
      <div id="chatBox"></div>
      <input id="userInput" placeholder="Ask something..." />
      <button onclick="sendMessage()">Send</button>
    </section>

  </main>

</div>

<script src="script.js"></script>
</body>
</html>
